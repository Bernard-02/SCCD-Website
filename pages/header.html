<header class="fixed top-0 left-0 right-0 z-50">
  <div class="site-container">
    <!-- 桌面版：整排 flex，1rem top padding -->
    <div class="hidden md:flex items-center pt-[2.5rem]">

      <!-- Logo -->
      <div class="relative flex-shrink-0 z-10">
        <a href="../index.html" class="absolute -top-4 left-0 z-50">
          <div id="header-logo" class="w-[180px] h-[180px]"></div>
        </a>
        <!-- 佔位撐開 logo 寬度 -->
        <div class="w-[180px] h-[56px]"></div>
      </div>

      <!-- About ~ Admission 組（矩形，左邊往 logo 後面延伸） -->
      <div data-bar="about" class="flex-shrink-0 ml-2xl bg-white rounded-none">
        <nav>
          <ul class="flex items-center gap-xl px-xs py-xs">
            <li><a href="about.html" class="nav-link"><span>About</span><span class="nav-link-cn">關於學系</span></a></li>
            <li><a href="faculty.html" class="nav-link"><span>Faculty</span><span class="nav-link-cn">師資</span></a></li>
            <li><a href="courses.html" class="nav-link"><span>Curriculum</span><span class="nav-link-cn">課程</span></a></li>
            <li><a href="activities.html" class="nav-link"><span>Activities</span><span class="nav-link-cn">動態</span></a></li>
            <li><a href="admission.html" class="nav-link"><span>Admissions</span><span class="nav-link-cn">入學</span></a></li>
          </ul>
        </nav>
      </div>

      <!-- Alumni Full Bar — 預設隱藏，body.page-alumni 時 clip-reveal 從左進場、padding 同 about-bar (px-xs py-xs)。
           白底黑字（跟 about-bar 同款），單獨一個 bar 方便動畫獨立控制 -->
      <div data-bar="alumni-full" class="flex-shrink-0 ml-2xl bg-white rounded-none" style="display: none;">
        <nav>
          <ul class="flex items-center gap-xl px-xs py-xs">
            <li><a href="alumni.html" class="nav-link"><span>Alumni Association</span><span class="nav-link-cn">系友會</span></a></li>
          </ul>
        </nav>
      </div>

      <!-- 彈性空間，把右側組推到最右 -->
      <div class="flex-1"></div>

      <!-- AA 小 bar（系友會入口）：hover 時 .nav-link-cn 展開「系友會」
           點擊：JS 觸發 lightbox-style 收起所有 bars + alumni-full bar clip-reveal 從左進場（同一頁面 body.page-alumni 切換）
           padding 對齊 about-bar inner items：px-xs py-xs -->
      <!-- TEMP HIDDEN 2026-05-21：AA 頁面暫時隱藏，header 不渲染系友會入口
      <div data-bar="alumni" class="flex-shrink-0 bg-black ml-lg" style="transition: background 0.4s ease;">
        <div class="px-xs py-xs">
          <a href="alumni.html" class="nav-link text-white"><span>AA</span><span class="nav-link-cn">系友會</span></a>
        </div>
      </div>
      -->


      <!-- Library 組 -->
      <div data-bar="library" class="flex-shrink-0 bg-black ml-lg" style="transition: background 0.4s ease;">
        <div class="px-xs py-xs">
          <a href="library.html" class="nav-link text-white"><span>Library</span><span class="nav-link-cn">檔案室</span></a>
        </div>
      </div>

      <!-- Atlas 組 -->
      <div data-bar="atlas" class="flex-shrink-0 bg-black ml-lg" style="transition: background 0.4s ease;">
        <div class="px-xs py-xs">
          <a href="atlas.html" class="nav-link text-white"><span>Atlas</span><span class="nav-link-cn">圖譜</span></a>
        </div>
      </div>

      <!-- TEMP HIDDEN 2026-05-26：Alumni 頁暫時隱藏（user 要求），header 桌面不渲染系友會入口
      <div data-bar="alumni" class="flex-shrink-0 bg-black ml-lg" style="transition: background 0.4s ease;">
        <div class="px-xs py-xs">
          <a href="alumni.html" class="nav-link text-white"><span>A.A.</span><span class="nav-link-cn">系友會</span></a>
        </div>
      </div>
      -->
      <!-- /TEMP HIDDEN -->

      <!-- Generate 組 -->
      <div data-bar="generate" class="flex-shrink-0 bg-black ml-lg" style="transition: background 0.4s ease;">
        <div class="px-xs py-xs">
          <a href="create.html" class="nav-link text-white"><span>CREATE!</span><span class="nav-link-cn">創造！</span></a>
        </div>
      </div>

      <!-- Mode 按鈕（圓底） -->
      <div id="mode-btn" data-bar="mode" class="flex-shrink-0 flex items-center justify-center ml-lg rounded-full" style="transition: background 0.4s ease;">
        <button class="theme-toggle-btn" aria-label="Toggle theme mode">
          <span class="icon icon-mode-1" data-header-mode-icon></span>
        </button>
      </div>


    </div>

    <!-- 手機版：logo + 漢堡按鈕 -->
    <div class="grid-12 items-center py-md md:hidden">
      <div class="col-span-6 relative">
        <a href="../index.html" class="absolute -top-4 left-0 z-50">
          <!-- 手機 logo Lottie：id 用 header-logo-mobile（避 desktop #header-logo 撞 id），header.js 拿到後 lottie.loadAnimation 跟桌面同檔同 mode 切換 -->
          <div id="header-logo-mobile" class="w-[80px] h-[80px]"></div>
        </a>
      </div>
      <div class="col-span-6 flex justify-end items-center gap-sm relative z-50">
        <!-- mobile mode-btn：跟桌面 #mode-btn 同 bg 邏輯（bg = page bg / mode-aware）— 用 #mode-btn-mobile id 對接 buttons.css 規則
             圓底（rounded-full）— 跟桌面 #mode-btn 視覺一致；menu btn 才是方形 -->
        <div id="mode-btn-mobile" data-bar="mode" class="mobile-header-btn rounded-full flex items-center justify-center">
          <button class="theme-toggle-btn" aria-label="Toggle theme mode">
            <span class="icon icon-mode-1" data-header-mode-icon></span>
          </button>
        </div>
        <!-- mobile menu-btn：方形（user 2026-05-25 拍板）；漢堡 icon 加旋轉動畫（mobile-menu.js 控）
             icon 開關用 inline style.display 切換（避 Tailwind .hidden vs FA display:inline-block cascade 競爭） -->
        <div class="mobile-header-btn flex items-center justify-center">
          <button class="mobile-menu-btn w-full h-full flex items-center justify-center" aria-label="Toggle menu">
            <span class="icon icon-menu icon-l mobile-menu-icon-rotate" data-mobile-menu-icon="open"></span>
            <i class="fa-solid fa-xmark text-h4" data-mobile-menu-icon="close" style="display:none"></i>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- 手機版全螢幕選單（桌面版隱藏）
       兩組對應桌面 header bar 設計：
       上組（about-group）= 桌面 about-bar 內 5 個（About / Faculty / Curriculum / Activities / Admissions）
       下組（utility-group）= 桌面右側獨立 bar 們（Library / Atlas / A.A. / CREATE!）
       中間用 flex-1 空白撐開分組視覺 -->
  <div class="mobile-nav fixed inset-0 bg-white z-40 md:hidden flex flex-col" style="transform: translateX(-100%);">
    <div class="site-container flex-1 flex flex-col pt-6xl pb-4xl">
      <nav class="flex-1 flex flex-col overflow-y-auto overflow-x-hidden">
        <!-- 上組：about-bar 內 5 項，順序對齊桌面：About → Faculty → Curriculum → Activities → Admissions
             mt-3xl 把上組整體下推離 header 區，給 logo + btn 視覺留呼吸空間 -->
        <ul class="flex flex-col gap-sm mt-3xl">
          <li><a href="about.html" class="mobile-nav-link block text-h4 font-semibold"><span class="mobile-nav-en">About</span> <span class="mobile-nav-zh">關於學系</span></a></li>
          <li><a href="faculty.html" class="mobile-nav-link block text-h4 font-semibold"><span class="mobile-nav-en">Faculty</span> <span class="mobile-nav-zh">師資</span></a></li>
          <li><a href="courses.html" class="mobile-nav-link block text-h4 font-semibold"><span class="mobile-nav-en">Curriculum</span> <span class="mobile-nav-zh">課程</span></a></li>
          <li><a href="activities.html" class="mobile-nav-link block text-h4 font-semibold"><span class="mobile-nav-en">Activities</span> <span class="mobile-nav-zh">動態</span></a></li>
          <li><a href="admission.html" class="mobile-nav-link block text-h4 font-semibold"><span class="mobile-nav-en">Admissions</span> <span class="mobile-nav-zh">入學</span></a></li>
        </ul>

        <!-- 中間空白撐開（兩組視覺分離） -->
        <div class="flex-1"></div>

        <!-- 下組：utility（Library / Atlas / A.A. / CREATE!） -->
        <ul class="flex flex-col gap-sm">
          <li><a href="library.html" class="mobile-nav-link block text-h4 font-semibold"><span class="mobile-nav-en">Library</span> <span class="mobile-nav-zh">檔案室</span></a></li>
          <li><a href="atlas.html" class="mobile-nav-link block text-h4 font-semibold"><span class="mobile-nav-en">Atlas</span> <span class="mobile-nav-zh">圖譜</span></a></li>
          <!-- TEMP HIDDEN 2026-05-26：Alumni 頁暫時隱藏（user 要求），mobile nav 不渲染系友會入口
          <li><a href="alumni.html" class="mobile-nav-link block text-h4 font-semibold"><span class="mobile-nav-en">A.A.</span> <span class="mobile-nav-zh">系友會</span></a></li>
          -->
          <!-- /TEMP HIDDEN -->
          <li><a href="create.html" class="mobile-nav-link block text-h4 font-semibold"><span class="mobile-nav-en">CREATE!</span> <span class="mobile-nav-zh">創造！</span></a></li>
        </ul>
      </nav>
    </div>
  </div>
</header>
