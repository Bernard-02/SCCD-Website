<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Courses - SCCD</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/output.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
</head>
<body>

  <!-- Header -->
  <div id="site-header"></div>

  <!-- Main Content -->
  <main>

    <!-- Hero Section with Background Image -->
    <section class="h-screen relative overflow-hidden">
      <!-- Background Image -->
      <div class="absolute inset-0 w-full h-full">
        <img src="../images/SCCD-1-4-0.jpg" alt="Courses" class="w-full h-full object-cover">
      </div>

      <!-- Content Container -->
      <div class="site-container h-full relative z-10">
        <div class="h-full flex flex-col md:flex-row justify-end md:justify-start items-start md:items-end gap-lg md:gap-xl pb-3xl md:pb-2xl pt-[120px] md:pt-0">
          <!-- Title on the left (Mobile: 100%, Desktop: 50%) -->
          <div class="w-full md:w-1/2">
            <h1 class="text-black hero-title inline-block" data-hero-hl>COURSES</h1>
          </div>

          <!-- Content on the right (Mobile: 100%, Desktop: 50%) -->
          <div class="w-full md:w-1/2">
            <p class="text-black mb-lg md:mb-xl hero-text-en" data-hero-hl>
              Explore our undergraduate and graduate programs designed to nurture creativity and communication skills in media design.
            </p>
            <p class="text-black hero-text-cn" data-hero-hl>
              探索學士班與碩士班課程，培育媒體傳達設計領域的創意與專業能力。
            </p>
          </div>
        </div>
      </div>
    </section>

    <!-- Courses Content Section
         Layout（桌面）：左 program bar (vertical sticky) ｜ 中 grid panels ｜ 右 sticky desc panel
                Mobile：垂直堆疊（bar → panels → desc 隱藏）
    -->
    <section class="bg-white py-6xl" id="courses-content-section">
      <div class="site-container">
        <div class="courses-content-row flex flex-col md:flex-row">

          <!-- Left column: program btn bar（桌面 vertical sticky；mobile 直接 flex-col 自然流） -->
          <div class="courses-program-bar flex flex-col items-start gap-lg md:gap-2xl mb-2xl md:mb-0">
            <div class="courses-program-group flex flex-col items-start gap-xs">
              <span class="courses-bfa-label">BFA Class&ensp;學士班</span>
              <button class="courses-program-btn active" data-program="bfa-animation">
                <span class="anchor-nav-inner"><span>Animation &amp; Moving<br>Image</span><span>動畫影像設計組</span></span>
              </button>
            </div>
            <div class="courses-program-group flex flex-col items-start gap-xs">
              <span class="courses-bfa-label">BFA Class&ensp;學士班</span>
              <button class="courses-program-btn" data-program="bfa-cmd">
                <span class="anchor-nav-inner"><span>Creative Media Design</span><span>創意媒體設計組</span></span>
              </button>
            </div>
            <button class="courses-program-btn" data-program="mdes">
              <span class="anchor-nav-inner"><span>MDES Class</span><span>碩士班</span></span>
            </button>
          </div>

          <!-- Middle column: 三個 program panel（grid 由 JS 渲染） -->
          <div class="flex-1 min-w-0">
            <div class="courses-panel" id="panel-bfa-animation">
              <div class="courses-grid"></div>
            </div>
            <div class="courses-panel hidden" id="panel-bfa-cmd">
              <div class="courses-grid"></div>
            </div>
            <div class="courses-panel hidden" id="panel-mdes">
              <div class="courses-grid"></div>
            </div>
          </div>

        </div>
      </div>
    </section>

    <!-- Course Detail Slide-in Modal（仿 #faculty-slide-in pattern）
         click 卡片 → 從右滑入；overlay/close-btn/Esc 關閉；body.overflow lock 鎖捲動 -->
    <div id="courses-slide-in" class="invisible pointer-events-none fixed inset-0 z-[150]">
      <div id="courses-overlay" class="absolute inset-0 bg-black opacity-0 cursor-pointer"></div>
      <!-- flex-col + 標題保留 mt-3xl 在頂端原位 / desc-en mt-auto 把描述推到 panel 底部
           （title 群與 desc 群分區：title 上、desc 下，中間空白由 mt-auto 吸收） -->
      <div id="courses-detail-panel" class="absolute right-0 top-0 bottom-0 w-full md:w-[40vw] overflow-y-auto p-2xl flex flex-col"
           style="background: white; transform: translateX(110%);">
        <h5 id="courses-detail-title-en" class="courses-detail-title-en text-h5 font-bold mb-0 mt-3xl"></h5>
        <h5 id="courses-detail-title-zh" class="courses-detail-title-zh text-h5 font-bold mb-0"></h5>
        <p id="courses-detail-desc-en" class="courses-detail-desc-en text-p2 mt-auto mb-lg" style="line-height: 1.6;"></p>
        <p id="courses-detail-desc-zh" class="courses-detail-desc-zh text-p2" style="line-height: 1.6;"></p>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <div id="site-footer"></div>

  <!-- JavaScript -->
  <!-- GSAP & ScrollTrigger -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/ScrollToPlugin.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/Draggable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/InertiaPlugin.min.js"></script>
  <script src="../js/utils/helpers.js"></script>
  <script type="module" src="../js/main-modular.js"></script>

</body>
</html>
