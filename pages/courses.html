<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Courses - SCCD</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/output.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
</head>
<body>

  <!-- Header -->
  <div id="site-header"></div>

  <!-- Main Content -->
  <main>
    <!-- Hero Section with Background Image -->
    <section class="h-screen relative overflow-hidden">
      <!-- Background Image -->
      <div class="absolute inset-0 w-full h-full">
        <img src="../images/SCCD-1-4-0.jpg" alt="Courses" class="w-full h-full object-cover">
      </div>

      <!-- Black Gradient Overlay (0% at top, 100% at bottom) -->
      <div class="absolute inset-0 w-full h-full bg-gradient-to-b from-transparent to-black"></div>

      <!-- Content Container -->
      <div class="site-container h-full relative z-10">
        <div class="h-full flex flex-col md:flex-row justify-end md:justify-start items-start md:items-end gap-lg md:gap-xl pb-3xl md:pb-2xl pt-[120px] md:pt-0">
          <!-- Title on the left (Mobile: 100%, Desktop: 50%) -->
          <div class="w-full md:w-1/2">
            <h1 class="text-white pb-lg md:pb-xl hero-title">COURSES</h1>
          </div>

          <!-- Content on the right (Mobile: 100%, Desktop: 50%) -->
          <div class="w-full md:w-1/2">
            <p class="text-white mb-lg md:mb-xl hero-text-en">
              Explore our undergraduate and graduate programs designed to nurture creativity and communication skills in media design.
            </p>
            <p class="text-white hero-text-cn">
              探索學士班與碩士班課程，培育媒體傳達設計領域的創意與專業能力。
            </p>
          </div>
        </div>
      </div>
    </section>

    <!-- Courses Content Section -->
    <section class="bg-white py-6xl" id="courses-content-section">
      <div class="site-container">
        <div class="flex flex-col md:flex-row gap-gutter">

          <!-- Left Program Buttons -->
          <div class="w-full md:flex-[0_0_calc(16.667%_-_1.25rem)]">
            <div class="flex flex-row flex-wrap md:flex-col gap-md mb-xl md:mb-0 md:sticky md:top-[160px]">
              <button class="courses-program-btn w-fit active text-left" data-program="bfa">
                <span class="anchor-nav-inner"><span>BFA</span><span>學士班</span></span>
              </button>
              <button class="courses-program-btn w-fit text-left" data-program="mdes">
                <span class="anchor-nav-inner"><span>MDES</span><span>碩士班</span></span>
              </button>
            </div>
          </div>

          <!-- Right Content Panels -->
          <!-- pb-2xl：讓 filter bar sticky 提早停止，不貼底 -->
          <div class="flex-1 min-w-0">

            <!-- Filter Bar: 在 flex-1 頂層 sticky，範圍等於整個右側內容（與左側 nav 同步） -->
            <div class="courses-filter-bar flex flex-wrap gap-lg py-sm md:sticky md:top-[160px] bg-white z-10">
              <button class="courses-filter-btn active whitespace-nowrap" data-filter="required"><span class="anchor-nav-inner">Required 必修</span></button>
              <button class="courses-filter-btn whitespace-nowrap" data-filter="elective"><span class="anchor-nav-inner">Elective 選修</span></button>
            </div>

            <!-- BFA Panel -->
            <div class="courses-panel pt-xl" id="panel-bfa">
              <!-- Course List -->
              <div class="courses-year-group" data-year="required" data-program="bfa">
                <div class="flex flex-col"></div>
              </div>
              <div class="courses-year-group" data-year="elective" data-program="bfa" style="display: none;">
                <div class="flex flex-col"></div>
              </div>
            </div>

            <!-- MDES Panel (hidden by default) -->
            <div class="courses-panel hidden pt-xl" id="panel-mdes">
              <!-- Course List -->
              <div class="courses-year-group" data-year="required" data-program="mdes">
                <div class="flex flex-col"></div>
              </div>
              <div class="courses-year-group" data-year="elective" data-program="mdes" style="display: none;">
                <div class="flex flex-col"></div>
              </div>
            </div>

          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <div id="site-footer"></div>

  <!-- JavaScript -->
  <!-- GSAP & ScrollTrigger -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollToPlugin.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Draggable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/InertiaPlugin.min.js"></script>
  <script src="../js/utils/helpers.js"></script>
  <script type="module" src="../js/main-modular.js"></script>

</body>
</html>
