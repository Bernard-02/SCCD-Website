<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library - SCCD</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/output.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bitter:ital,wght@0,400;0,600;0,700;1,400&family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/components/library.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body class="overflow-hidden h-screen">

  <!-- Header -->
  <div id="site-header"></div>

  <!-- Main Content -->
  <main id="page-content">
    <!-- Card Stack Hero -->
    <section class="relative overflow-visible" style="height: calc(100vh - var(--header-height)); margin-top: var(--header-height);">
      <!-- Mobile-only tab bar（桌面 display:none，由 CSS 控；JS 在 < 768 不跑 card stack 改用此 tab bar）
           沿用 .activities-section-bar / .activities-section-btn + anchor-nav-inner 結構，
           繼承 buttons.css 樣式（pill + active 隨機色/旋轉 + 手機 horizontal scroll） -->
      <div id="library-mobile-tabs" class="library-mobile-tabs activities-section-bar flex flex-row gap-xs no-scrollbar">
        <button class="activities-section-btn w-fit active text-left" data-tab="awards">
          <span class="anchor-nav-inner"><span>Awards</span><span>榮譽</span></span>
        </button>
        <button class="activities-section-btn w-fit text-left" data-tab="files">
          <span class="anchor-nav-inner"><span>Documents</span><span>文件</span></span>
        </button>
        <button class="activities-section-btn w-fit text-left" data-tab="press">
          <span class="anchor-nav-inner"><span>Press</span><span>報導</span></span>
        </button>
        <button class="activities-section-btn w-fit text-left" data-tab="album">
          <span class="anchor-nav-inner"><span>Albums</span><span>相簿</span></span>
        </button>
      </div>
      <div id="library-card-stack" class="absolute inset-0 flex items-center justify-center">
        <!-- 三原色背景矩形（由 JS 生成） -->
      </div>
      <!-- 灰色主矩形（永遠在最上層） -->
      <div id="library-card-main" class="absolute">

        <!-- 內容層：用於 fade in/out -->
        <div id="library-card-content" style="display: flex; flex-direction: column; width: 100%; height: 100%;">

          <!-- ══ Awards Panel ══ -->
          <div id="lib-panel-awards" style="display: flex; flex-direction: column; width: 100%; height: 100%; position: relative; overflow: visible;">

            <!-- 標題（貼在 panel 左上角） -->
            <p class="lib-panel-title" style="position: absolute; top: 0; left: calc(-1 * var(--spacing-xl)); font-size: var(--font-size-h5); font-weight: 700; display: inline-block; padding: 6px 8px 5px; z-index: 1;">Awards 榮譽</p>

            <!-- 內容區（flex: 1，不含 ticker） -->
            <!-- padding-top = md 對齊其他三個 panel（press/files/album 都是 var(--spacing-md)）；原本 md/2 害 award 灰卡內容比其他高 12px（user 2026-06-15） -->
            <div style="flex: 1; min-height: 0; display: grid; grid-template-columns: max-content 1fr; grid-template-rows: 1fr; gap: 0 var(--spacing-2xl); padding: var(--spacing-md) var(--spacing-md) 0 var(--spacing-md);">

              <!-- 左：年份 Picker；padding-top:4px 讓 picker 第一個年份對齊右側 list 第一個年份標題
                   （4px = 右側 search bar 的 padding-bottom 4px；border-bottom 已移除 user 2026-06-23，純 px 不隨字級變、穩定） -->
              <!-- padding-bottom:xs 比照右側 count(total) 的 padding，讓 picker 末年份不貼 ticker（user 2026-06-22）。
                   間距放外層容器而非 picker-wrap：scroll 容器的尾端 padding-bottom 在內容 overflow 時不可靠。手機 line 982 已 padding-bottom:0 不受影響 -->
              <div style="display: flex; flex-direction: column; min-height: 0; padding-top: 4px; padding-bottom: var(--spacing-xs);">
                <!-- 「Year 年份」標題已隱藏（同其他三 panel 去標題）；但 awards 是單列 grid，picker 與 list
                     疊在同 cell，靠此 p 的高度把 picker 推到對齊 list 第一年份。故用 visibility:hidden 留高度當 spacer
                     （非 display:none），p3 行高與右側 search 同字級→對齊隨字級自動成立。 -->
                <p aria-hidden="true" style="font-weight: 700; font-size: var(--font-size-p3); padding: 0 0 var(--spacing-sm); flex-shrink: 0; visibility: hidden;">Year 年份</p>
                <div id="library-year-picker-wrap" style="overflow-y: scroll; min-height: 0;" class="no-scrollbar">
                  <div id="library-year-picker" style="display: flex; flex-direction: column; gap: var(--spacing-xs);"></div>
                </div>
              </div>

              <!-- 右：Search + Award List -->
              <div style="min-width: 0; display: flex; flex-direction: column; min-height: 0;">
                <div style="display: flex; align-items: flex-end; gap: var(--spacing-sm); flex-shrink: 0; margin-bottom: var(--spacing-sm);">
                  <div style="flex: 1; display: flex; align-items: center; gap: var(--spacing-sm); padding-bottom: 4px;">
                    <span class="icon icon-search icon-xs"></span>
                    <input type="text" id="library-awards-search" placeholder="Search 搜尋" aria-label="搜尋 Search"
                      style="flex: 1; background: transparent; border: none; outline: none; font-family: 'Bitter', 'Noto Serif TC', serif; font-size: var(--font-size-p3); font-weight: 700; color: var(--lib-fg);"
                      autocomplete="off">
                  </div>
                  <button id="library-awards-sort-btn" class="library-sort-btn">Date 時間<span class="icon icon-arrow-down sort-arrow icon-xs"></span></button>
                </div>
                <div id="library-awards-scroll" style="min-width: 0; overflow-y: auto; padding-bottom: var(--spacing-sm); flex: 1; min-height: 0;" class="no-scrollbar">
                  <div id="library-awards-list"></div>
                </div>
                <!-- Award 計數（塞在 list 欄底部、靠右對齊 list 右緣；order:4 確保手機 display:contents 後排在 scroll 之後） -->
                <div id="library-awards-count" style="order: 4; flex-shrink: 0; text-align: right; font-size: var(--font-size-p3); font-weight: 700; color: var(--lib-fg);"></div>
              </div>

            </div>

            <!-- Logo Ticker -->
            <div id="library-awards-ticker" style="flex-shrink: 0; padding-top: calc(var(--spacing-md) / 2); padding-bottom: var(--spacing-md); overflow: hidden; width: 100%;">
              <div class="awards-ticker-wrapper" style="display: flex; width: 100%;"></div>
            </div>

          </div><!-- end #lib-panel-awards -->

          <!-- ══ Press Panel ══ -->
          <div id="lib-panel-press" style="display: none; flex-direction: column; width: 100%; height: 100%; position: relative; overflow: visible;">

            <!-- 標題（貼在 panel 頂邊） -->
            <p class="lib-panel-title" style="position: absolute; top: 0; left: calc(-1 * var(--spacing-xl)); font-size: var(--font-size-h5); font-weight: 700; display: inline-block; padding: 6px 8px 5px; z-index: 1;">Press 報導</p>

            <!-- 內容區：2 rows — 分類篩選/search、picker/list -->
            <div style="flex: 1; min-height: 0; display: grid; grid-template-columns: max-content 1fr; grid-template-rows: auto 1fr; gap: 0 var(--spacing-2xl); padding: var(--spacing-md) var(--spacing-md) var(--spacing-sm) var(--spacing-md);">

              <!-- 左上：grid 佔位（Year 年份 標題已移除，保留空 cell 維持 grid/nth-child 結構） -->
              <div></div>

              <!-- 右上：Search -->
              <div style="min-width: 0; padding-bottom: var(--spacing-sm);">
                <div style="display: flex; align-items: flex-end; gap: var(--spacing-sm);">
                  <div style="flex: 1; display: flex; align-items: center; gap: var(--spacing-sm); padding-bottom: 4px;">
                    <span class="icon icon-search icon-xs"></span>
                    <input type="text" id="library-press-search" placeholder="Search 搜尋" aria-label="搜尋 Search"
                      style="flex: 1; background: transparent; border: none; outline: none; font-family: 'Bitter', 'Noto Serif TC', serif; font-size: var(--font-size-p3); font-weight: 700; color: var(--lib-fg);"
                      autocomplete="off">
                  </div>
                  <button id="library-press-sort-btn" class="library-sort-btn">Date 時間<span class="icon icon-arrow-down sort-arrow icon-xs"></span></button>
                </div>
              </div>

              <!-- 左下：年份 Picker -->
              <div style="display: flex; flex-direction: column; min-height: 0; height: 100%; overflow: hidden;">
                <div id="library-press-year-picker-wrap" style="flex: 1; overflow-y: scroll; min-height: 0; padding-bottom: var(--spacing-sm);" class="no-scrollbar">
                  <div id="library-press-year-picker" style="display: flex; flex-direction: column; gap: var(--spacing-xs);"></div>
                </div>
              </div>

              <!-- 右下：Press List -->
              <div id="library-press-scroll" style="min-width: 0; overflow-y: auto; padding-bottom: var(--spacing-sm);" class="no-scrollbar">
                <div id="library-press-list"></div>
              </div>

            </div>

          </div><!-- end #lib-panel-press -->

          <!-- ══ Files Panel ══ -->
          <div id="lib-panel-files" style="display: none; flex-direction: column; width: 100%; height: 100%; position: relative; overflow: visible;">

            <!-- 標題（貼在 panel 頂邊） -->
            <p class="lib-panel-title" style="position: absolute; top: 0; left: calc(-1 * var(--spacing-2xl)); font-size: var(--font-size-h5); font-weight: 700; display: inline-block; padding: 6px 8px 5px; z-index: 1;">Documents 文件</p>

            <div style="flex: 1; min-height: 0; display: grid; grid-template-columns: max-content 1fr; grid-template-rows: auto 1fr; gap: 0 var(--spacing-2xl); padding: var(--spacing-md) var(--spacing-md) var(--spacing-sm) var(--spacing-md);">

              <!-- 左上：grid 佔位（Year 年份 標題已移除，保留空 cell 維持 grid/nth-child 結構） -->
              <div></div>

              <!-- 右上：Search -->
              <div style="min-width: 0; padding-bottom: var(--spacing-sm);">
                <div style="display: flex; align-items: flex-end; gap: var(--spacing-sm);">
                  <div style="flex: 1; display: flex; align-items: center; gap: var(--spacing-sm); padding-bottom: 4px;">
                    <span class="icon icon-search icon-xs"></span>
                    <input type="text" id="library-files-search" placeholder="Search 搜尋" aria-label="搜尋 Search"
                      style="flex: 1; background: transparent; border: none; outline: none; font-family: 'Bitter', 'Noto Serif TC', serif; font-size: var(--font-size-p3); font-weight: 700; color: var(--lib-fg);"
                      autocomplete="off">
                  </div>
                  <button id="library-files-sort-btn" class="library-sort-btn">Date 時間<span class="icon icon-arrow-down sort-arrow icon-xs"></span></button>
                </div>
              </div>

              <!-- 左下：年份 Picker -->
              <div style="display: flex; flex-direction: column; min-height: 0; height: 100%; overflow: hidden;">
                <div id="library-files-year-picker-wrap" style="flex: 1; overflow-y: scroll; min-height: 0; padding-bottom: var(--spacing-sm);" class="no-scrollbar">
                  <div id="library-files-year-picker" style="display: flex; flex-direction: column; gap: var(--spacing-xs);"></div>
                </div>
              </div>

              <!-- 右下：Files List -->
              <div id="library-files-scroll" style="min-width: 0; overflow: hidden auto; padding-bottom: var(--spacing-sm);" class="no-scrollbar">
                <div id="library-files-list" style="display: flex; flex-direction: column; gap: var(--spacing-2xl);"></div>
              </div>

            </div>

          </div><!-- end #lib-panel-files -->

          <!-- ══ Album Panel ══ -->
          <div id="lib-panel-album" style="display: none; flex-direction: column; width: 100%; height: 100%; position: relative; overflow: visible;">

            <!-- 標題（貼在 panel 頂邊） -->
            <p class="lib-panel-title" style="position: absolute; top: 0; left: calc(-1 * var(--spacing-xl)); font-size: var(--font-size-h5); font-weight: 700; display: inline-block; padding: 6px 8px 5px; z-index: 1;">Albums 相簿</p>

            <div style="flex: 1; min-height: 0; display: grid; grid-template-columns: max-content 1fr; grid-template-rows: auto 1fr; gap: 0 var(--spacing-2xl); padding: var(--spacing-md) var(--spacing-md) var(--spacing-sm) var(--spacing-md);">

              <!-- 左上：grid 佔位（Year 年份 標題已移除，保留空 cell 維持 grid/nth-child 結構） -->
              <div></div>

              <!-- 右上：Search + 分類篩選 -->
              <div style="min-width: 0; padding-bottom: var(--spacing-sm);">
                <div style="display: flex; align-items: flex-end; gap: var(--spacing-sm); margin-bottom: var(--spacing-sm);">
                  <div style="flex: 1; display: flex; align-items: center; gap: var(--spacing-sm); padding-bottom: 4px;">
                    <span class="icon icon-search icon-xs"></span>
                    <input type="text" id="library-album-search" placeholder="Search 搜尋" aria-label="搜尋 Search"
                      style="flex: 1; background: transparent; border: none; outline: none; font-family: 'Bitter', 'Noto Serif TC', serif; font-size: var(--font-size-p3); font-weight: 700; color: var(--lib-fg);"
                      autocomplete="off">
                  </div>
                  <button id="library-album-sort-btn" class="library-sort-btn">Date 時間<span class="icon icon-arrow-down sort-arrow icon-xs"></span></button>
                </div>
                <div id="library-album-cat-filter" style="display: flex; flex-wrap: wrap; gap: var(--spacing-sm) var(--spacing-lg); align-content: flex-start;">
                  <button class="lib-album-cat-btn" data-cat="degree-show"><span class="cat-btn-en">Degree Shows</span><span class="cat-btn-zh">畢業展</span></button>
                  <button class="lib-album-cat-btn" data-cat="exhibitions"><span class="cat-btn-en">Exhibitions</span><span class="cat-btn-zh">展演</span></button>
                  <button class="lib-album-cat-btn" data-cat="workshop"><span class="cat-btn-en">Workshops</span><span class="cat-btn-zh">工作營</span></button>
                  <button class="lib-album-cat-btn" data-cat="courses"><span class="cat-btn-en">Courses</span><span class="cat-btn-zh">課程</span></button>
                  <button class="lib-album-cat-btn" data-cat="lectures"><span class="cat-btn-en">Lectures</span><span class="cat-btn-zh">講座</span></button>
                  <button class="lib-album-cat-btn" data-cat="visits"><span class="cat-btn-en">Visits</span><span class="cat-btn-zh">參訪</span></button>
                  <button class="lib-album-cat-btn" data-cat="competitions"><span class="cat-btn-en">Competitions</span><span class="cat-btn-zh">競賽</span></button>
                  <button class="lib-album-cat-btn" data-cat="conferences"><span class="cat-btn-en">Forums</span><span class="cat-btn-zh">論壇</span></button>
                  <button class="lib-album-cat-btn" data-cat="students-present"><span class="cat-btn-en">Students Present</span><span class="cat-btn-zh">學生自主</span></button>
                  <button class="lib-album-cat-btn" data-cat="industry"><span class="cat-btn-en">Industry Partnerships</span><span class="cat-btn-zh">產學合作</span></button>
                  <button class="lib-album-cat-btn" data-cat="summer-camp"><span class="cat-btn-en">Camp</span><span class="cat-btn-zh">體驗營</span></button>
                  <button class="lib-album-cat-btn" data-cat="moment"><span class="cat-btn-en">Moment</span><span class="cat-btn-zh">日常</span></button>
                  <button class="lib-album-cat-btn" data-cat="others"><span class="cat-btn-en">Others</span><span class="cat-btn-zh">其他</span></button>
                </div>
              </div>

              <!-- 左下：年份 Picker -->
              <div style="display: flex; flex-direction: column; min-height: 0; height: 100%; overflow: hidden;">
                <div id="library-album-year-picker-wrap" style="flex: 1; overflow-y: scroll; min-height: 0; padding-bottom: var(--spacing-sm);" class="no-scrollbar">
                  <div id="library-album-year-picker" style="display: flex; flex-direction: column; gap: var(--spacing-xs);"></div>
                </div>
              </div>

              <!-- 右下：Album List -->
              <div id="library-album-scroll" style="min-width: 0; overflow-y: auto; padding-bottom: var(--spacing-sm);" class="no-scrollbar">
                <div id="library-album-list" style="display: flex; flex-direction: column; gap: var(--spacing-2xl);"></div>
              </div>

            </div>

          </div><!-- end #lib-panel-album -->

        </div><!-- end #library-card-content -->

      </div>
    </section>
  </main>

  <!-- Footer：library 不顯示 footer，但容器必須存在 —— first-load 為 library 時 initFooter() 才找得到，
       否則整個 session footer 永久消失（router 對 library 自動設 display:none） -->
  <div id="site-footer"></div>

  <!-- PDF Viewer Modal 由 js/modules/pages/library-viewer.js 的 ensurePdfModal() 動態 append 到 body
       行為包含 zoom +/- 按鈕、wheel 翻頁/pan、上下左右翻頁、左下 title pill — 集中在 module 內維護 -->

  <!-- JavaScript -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/Draggable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/InertiaPlugin.min.js"></script>
  <script src="../js/utils/helpers.js"></script>
  <script type="module" src="../js/main-modular.js"></script>

</body>
</html>
