<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curriculum - SCCD</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/output.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
</head>
<body>

  <!-- Header -->
  <div id="site-header"></div>

  <!-- Main Content -->
  <main id="page-content">

    <!-- Courses Hero Section
         桌面 .hero-rand-grid：4 元素隨機 corner 排版（hero-animation.js）
         手機 .hero-mobile：圖墊底 + 文字 stack 疊在圖上（hero-mobile-sync.js 從桌面 clone） -->
    <section class="min-h-screen md:h-screen relative overflow-x-clip md:overflow-hidden">
      <!-- 手機版 -->
      <div class="hero-mobile">
        <div class="hero-mobile-bg">
          <img src="" alt="">
        </div>
        <div class="hero-mobile-text">
          <h1 class="text-black hero-mobile-title" data-hero-hl></h1>
          <h1 class="text-black hero-mobile-title-cn" data-hero-hl></h1>
          <p class="text-black hero-mobile-text-en" data-hero-hl></p>
          <p class="text-black hero-mobile-text-cn" data-hero-hl></p>
        </div>
      </div>
      <!-- 桌面版 -->
      <div class="hero-rand-grid">
        <h1 class="text-black hero-title inline-block" data-hero-hl>CURRICULUM</h1>
        <h1 class="text-black hero-title-cn inline-block" data-hero-hl>課程</h1>
        <div class="hero-banner">
          <img src="../images/SCCD-1-4-0.jpg" alt="Courses">
        </div>
        <p class="text-black hero-text-en" data-hero-hl>
          Explore our undergraduate and graduate programs designed to nurture creativity and communication skills in media design.
        </p>
        <p class="text-black hero-text-cn" data-hero-hl>
          探索學士班與碩士班課程，培育媒體傳達設計領域的創意與專業能力。
        </p>
      </div>
    </section>

    <!-- Courses Content Section
         Layout（桌面）：左 program bar (vertical sticky) ｜ 中 grid panels ｜ 右 sticky desc panel
                Mobile：垂直堆疊（bar → panels → desc 隱藏）
    -->
    <section class="bg-white min-h-screen pt-3xl pb-6xl md:py-6xl" id="courses-content-section">
      <div class="site-container">
        <!-- grid-20：桌面 program bar 占 cols 1-4、課程內容 cols 5-20（對齊 faculty/about col-5）；手機 flex-col 堆疊 -->
        <div class="courses-content-row flex flex-col gap-gutter md:grid md:grid-cols-20">

          <!-- Left column: program btn bar（桌面 cols 1-4，vertical sticky；mobile 直接 flex-col 自然流）
               注意：bar 容器佔 col-span-4，但 courses.css 的 width:14rem 仍保留 bar 寬度＝按鈕不動 -->
          <div class="courses-program-bar flex flex-col items-start gap-lg md:gap-2xl mb-2xl md:mb-0 md:col-span-4">
            <div class="courses-program-group flex flex-col items-start gap-xs">
              <span class="courses-bfa-label">BFA 學士班</span>
              <button class="courses-program-btn active" data-program="bfa-animation">
                <span class="anchor-nav-inner"><span>Animation &amp; Moving<br>Image</span><span>動畫影像設計組</span></span>
              </button>
            </div>
            <div class="courses-program-group flex flex-col items-start gap-xs">
              <span class="courses-bfa-label">BFA 學士班</span>
              <button class="courses-program-btn" data-program="bfa-cmd">
                <span class="anchor-nav-inner"><span>Creative Media Design</span><span>創意媒體設計組</span></span>
              </button>
            </div>
            <button class="courses-program-btn" data-program="mdes">
              <span class="anchor-nav-inner"><span>MDES</span><span>碩士班</span></span>
            </button>
          </div>

          <!-- Middle column: 三個 program panel（grid 由 JS 渲染）；桌面占 cols 5-20 -->
          <div class="min-w-0 md:col-start-5 md:col-span-16">
            <div class="courses-panel" id="panel-bfa-animation">
              <div class="courses-grid"></div>
            </div>
            <div class="courses-panel hidden" id="panel-bfa-cmd">
              <div class="courses-grid"></div>
            </div>
            <div class="courses-panel hidden" id="panel-mdes">
              <div class="courses-grid"></div>
            </div>
          </div>

        </div>
      </div>
    </section>

    <!-- Course Detail Slide-in Modal（仿 #faculty-slide-in pattern）
         click 卡片 → 從右滑入；overlay/close-btn/Esc 關閉；body.overflow lock 鎖捲動
         手機：頂部留 header 高度避讓 logo + mode + menu；返回鍵在 panel 內 flow 最上方，title 接著返回鍵 -->
    <div id="courses-slide-in" class="invisible pointer-events-none fixed inset-0 z-[150]">
      <div id="courses-overlay" class="absolute inset-0 bg-black opacity-0 cursor-pointer"></div>
      <!-- title 區 sticky 在頂端不動；desc 包進固定 wrapper，內部 overflow-y 自己 scroll（參考 activities list-scroll pattern） -->
      <div id="courses-detail-panel" class="absolute right-0 top-0 bottom-0 w-full md:w-[40%] overflow-hidden"
           style="background: white; transform: translateX(110%);">
        <!-- padding 對齊 faculty slide-in（px-container-padding / pt-calc(header+5rem) / pb-6xl 手機；桌面 pt-4xl pb-2xl）
             整個 inner = scroll container（overflow-y-auto），title 區 sticky top:0 → 內文長時 title 黏頂端 -->
        <!-- pb = container-padding（手機 24 / 桌面 60）讓底部 padding 跟左右視覺同級；
             桌面維持 md:pb-2xl(64) 保留原節奏 -->
        <div class="courses-detail-inner w-full h-full px-container-padding pt-[calc(var(--header-height,80px)+5rem)] pb-[var(--container-padding)] md:pt-4xl md:pb-2xl flex flex-col overflow-y-auto no-scrollbar bg-inherit">
          <!-- Sticky 群組：手機返回鍵 + title 一起黏在頂部（user 要求兩者都 sticky）
               bg inherit → 自動繼承 panel 動態 accent 色，scroll 時遮住下方 desc -->
          <div class="courses-detail-title-sticky">
            <button id="courses-back-btn-mobile" class="md:hidden block mb-xl cursor-pointer bg-transparent self-start" aria-label="返回">
              <span class="icon icon-arrow-left text-black icon-m"></span>
            </button>
            <h5 id="courses-detail-title-en" class="courses-detail-title-en text-h5 font-bold mb-0"></h5>
            <h5 id="courses-detail-title-zh" class="courses-detail-title-zh text-h5 font-bold mb-0"></h5>
          </div>
          <div class="courses-detail-desc-wrapper mt-xl">
            <p id="courses-detail-desc-en" class="courses-detail-desc-en text-p1 mb-lg" style="line-height: 1.6;"></p>
            <p id="courses-detail-desc-zh" class="courses-detail-desc-zh text-p1" style="line-height: 1.6;"></p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <div id="site-footer"></div>

  <!-- JavaScript -->
  <!-- GSAP & ScrollTrigger -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/ScrollToPlugin.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/Draggable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/InertiaPlugin.min.js"></script>
  <script src="../js/utils/helpers.js"></script>
  <script type="module" src="../js/main-modular.js"></script>

</body>
</html>
