<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activities - SCCD</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/output.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
</head>
<body>

  <!-- Header -->
  <div id="site-header"></div>

  <!-- Main Content -->
  <main id="page-content">
    <!-- Activities Hero Section
         桌面 .hero-rand-grid：4 元素隨機 corner 排版（hero-animation.js）
         手機 .hero-mobile：圖墊底 + 文字 stack 疊在圖上（hero-mobile-sync.js 從桌面 clone） -->
    <section class="snap-zone min-h-screen md:h-screen relative overflow-x-clip md:overflow-hidden">
      <!-- 手機版 -->
      <div class="hero-mobile">
        <div class="hero-mobile-bg">
          <img src="" alt="">
        </div>
        <div class="hero-mobile-text">
          <h1 class="text-black hero-mobile-title" data-hero-hl></h1>
          <h1 class="text-black hero-mobile-title-cn" data-hero-hl></h1>
          <p class="text-black hero-mobile-text-en" data-hero-hl></p>
          <p class="text-black hero-mobile-text-cn" data-hero-hl></p>
        </div>
      </div>
      <!-- 桌面版 -->
      <div class="hero-rand-grid">
        <h1 class="text-black hero-title inline-block" data-hero-hl>ACTIVITIES</h1>
        <h1 class="text-black hero-title-cn inline-block" data-hero-hl>動態</h1>
        <div class="hero-banner">
          <img src="../images/SCCD-1-4-0.jpg" alt="Activities">
        </div>
        <p class="text-black hero-text-en text-p1" data-hero-hl>
          From hands-on workshops and degree shows to summer camps and student-led initiatives, SCCD's activities enrich creative learning and foster a vibrant community of designers.
        </p>
        <p class="text-black hero-text-cn text-p1" data-hero-hl>
          從工作營、畢業展到暑期體驗營與學生自主活動，學系透過多元的課外活動豐富學生的創意學習歷程，凝聚充滿活力的設計社群。
        </p>
      </div>
    </section>

    <!-- Activities Content Section -->
    <!-- min-height:100vh：scrollSectionIntoView 改成把 section 頂對齊 viewport 頂(top:0) 後，
         section 要至少滿一個 viewport 才捲得到位（短 panel 如 Permanent 2 筆不會被頁底 clamp 露出 hero），
         且對齊時剛好填滿 viewport 不讓 footer 從底部露出（user 2026-06-05）。 -->
    <section class="snap-zone bg-white pt-6xl pb-3xl" id="activities-content-section" style="min-height: 100vh;">
      <!-- 手機 header blocker：透明 fixed site-header 下、sticky title 上方透明帶用一條 sticky theme-bg 帶補實。
           桌面有 filter bar 接住故 md:hidden。詳見 lists.css .list-mobile-header-blocker -->
      <div class="list-mobile-header-blocker md:hidden" aria-hidden="true"></div>
      <div class="site-container">
        <!-- grid-20：桌面 nav bar 占 cols 1-4、內容 cols 5-20（對齊 faculty/curriculum col-5）；手機 flex-col 堆疊 -->
        <div class="flex flex-col gap-gutter md:grid md:grid-cols-20">

          <!-- Left Section Buttons（桌面 cols 1-4，nav btn 不動，內部 .activities-section-bar 仍 content-width sticky）
               md:min-h：短分頁內容比 section(min-h:100vh) 矮時，左欄需填滿 section 內容區（100vh−pt6xl192−pb3xl96=288）
               否則 sticky nav 在內容底就 unstick 捲走、下面留白＋footer 卻沒 nav＝「還沒到底 nav 就不見」(user 2026-06-27) -->
          <div class="w-full md:col-span-4 md:min-h-[calc(100vh_-_288px)]">
            <div class="activities-section-bar flex flex-row md:flex-col gap-xs md:gap-xs md:mb-0 md:sticky md:top-[200px] no-scrollbar">
              <button class="activities-section-btn w-fit active text-left" data-section="exhibitions">
                <span class="anchor-nav-inner"><span>Exhibitions</span><span>展演</span></span>
              </button>
              <button class="activities-section-btn w-fit text-left" data-section="workshop">
                <span class="anchor-nav-inner"><span>Workshops</span><span>工作營</span></span>
              </button>
              <button class="activities-section-btn w-fit text-left" data-section="degree-show">
                <span class="anchor-nav-inner"><span>Degree Shows</span><span>畢業展</span></span>
              </button>
              <button class="activities-section-btn w-fit text-left" data-section="lectures">
                <span class="anchor-nav-inner"><span>Lectures</span><span>講座</span></span>
              </button>
              <button class="activities-section-btn w-fit text-left" data-section="visits">
                <span class="anchor-nav-inner"><span>Visits</span><span>參訪</span></span>
              </button>
              <button class="activities-section-btn w-fit text-left" data-section="competitions">
                <span class="anchor-nav-inner"><span>Competitions</span><span>競賽</span></span>
              </button>
              <button class="activities-section-btn w-fit text-left" data-section="conferences">
                <span class="anchor-nav-inner"><span>Forums</span><span>論壇</span></span>
              </button>
              <button class="activities-section-btn w-fit text-left" data-section="students-present">
                <span class="anchor-nav-inner"><span>Students Present</span><span>學生自主</span></span>
              </button>
              <button class="activities-section-btn w-fit text-left" data-section="industry">
                <span class="anchor-nav-inner"><span>Industry<br>Partnerships</span><span>產學合作</span></span>
              </button>
            </div>
          </div>

          <!-- Right Content Panels（桌面 cols 5-20；內部各 panel 仍用 grid-12 排 desc/filter/list，相對內容區不衝突） -->
          <div class="min-w-0 md:col-start-5 md:col-span-16">

            <!-- Exhibitions Panel -->
            <div class="activities-panel" id="panel-exhibitions">
              <div class="activities-filter-bar md:sticky md:top-[200px] bg-white z-10">
                <div class="grid-12 pb-lg">
                  <div class="col-span-12 md:col-span-11 md:col-start-2 md:pl-[41px]">
                    <div id="exhibitions-type-filter" class="flex flex-wrap gap-lg pb-lg">
                      <button class="exhibitions-type-btn courses-filter-btn active whitespace-nowrap" data-type="special"><span class="anchor-nav-inner">Temporary 特設</span></button>
                      <button class="exhibitions-type-btn courses-filter-btn whitespace-nowrap" data-type="permanent"><span class="anchor-nav-inner">Permanent 常設</span></button>
                    </div>
                    <div class="activities-search-inner list-reveal-row flex items-center gap-sm pb-xs">
                      <span class="icon icon-search icon-m activities-search-icon"></span>
                      <input id="activities-search-input" type="text" placeholder="Search 搜尋" aria-label="搜尋 Search" class="activities-search-input flex-1 bg-transparent outline-none text-h5 font-bold" data-panel="panel-exhibitions" autocomplete="off">
                    </div>
                  </div>
                </div>
              </div>
              <div id="activities-search-spacer"></div>
              <div id="exhibitions-list-special"></div>
              <!-- Permanent list 是 hideYearHeader（loader 端 flush-left）；本 panel 要對齊 search bar
                   → 用 grid-12 wrapper 把 list 推到跟 search bar 同位置（col-start-2 + pl-[41px]）。
                   結構性對齊由 page 層處理，不污染 list component -->
              <div class="grid-12">
                <div id="exhibitions-list-permanent" class="col-span-12 md:col-span-11 md:col-start-2 md:pl-[41px]" style="display: none;"></div>
              </div>
            </div>

            <!-- Workshop Panel -->
            <div class="activities-panel hidden" id="panel-workshop">
              <div class="activities-filter-bar md:sticky md:top-[200px] bg-white z-10">
                <div class="grid-12 pb-lg">
                  <div class="col-span-12 md:col-span-11 md:col-start-2 md:pl-[41px]">
                    <div class="activities-search-inner list-reveal-row flex items-center gap-sm pb-xs">
                      <span class="icon icon-search icon-m activities-search-icon"></span>
                      <input type="text" placeholder="Search 搜尋" aria-label="搜尋 Search" class="activities-search-input flex-1 bg-transparent outline-none text-h5 font-bold" data-panel="panel-workshop" autocomplete="off">
                    </div>
                  </div>
                </div>
              </div>
              <div id="workshop-list"></div>
            </div>

            <!-- Degree Show Panel -->
            <div class="activities-panel hidden" id="panel-degree-show">
              <div class="activities-filter-bar md:sticky md:top-[200px] bg-white z-10">
                <div class="grid-12 pb-lg">
                  <div class="col-span-12 md:col-span-11 md:col-start-2 md:pl-[41px]">
                    <div class="activities-search-inner list-reveal-row flex items-center gap-sm pb-xs">
                      <span class="icon icon-search icon-m activities-search-icon"></span>
                      <input type="text" placeholder="Search 搜尋" aria-label="搜尋 Search" class="activities-search-input flex-1 bg-transparent outline-none text-h5 font-bold" data-panel="panel-degree-show" autocomplete="off">
                    </div>
                  </div>
                </div>
              </div>
              <div id="degree-show-list" class="flex flex-col gap-3xl"></div>
            </div>

            <!-- Lectures Panel -->
            <div class="activities-panel hidden" id="panel-lectures">
              <div class="activities-filter-bar md:sticky md:top-[200px] bg-white z-10">
                <div class="grid-12 pb-lg">
                  <div class="col-span-12 md:col-span-11 md:col-start-2 md:pl-[41px]">
                    <div class="activities-search-inner list-reveal-row flex items-center gap-sm pb-xs">
                      <span class="icon icon-search icon-m activities-search-icon"></span>
                      <input type="text" placeholder="Search 搜尋" aria-label="搜尋 Search" class="activities-search-input flex-1 bg-transparent outline-none text-h5 font-bold" data-panel="panel-lectures" autocomplete="off">
                    </div>
                  </div>
                </div>
              </div>
              <div id="lectures-list"></div>
            </div>

            <!-- Visits Panel -->
            <div class="activities-panel hidden" id="panel-visits">
              <div class="activities-filter-bar md:sticky md:top-[200px] bg-white z-10">
                <div class="grid-12 pb-lg">
                  <div class="col-span-12 md:col-span-11 md:col-start-2 md:pl-[41px]">
                    <div id="visits-type-filter" class="flex flex-wrap gap-lg pb-lg">
                      <button class="visits-type-btn courses-filter-btn active whitespace-nowrap" data-type="outbound"><span class="anchor-nav-inner">Outbound 出訪</span></button>
                      <button class="visits-type-btn courses-filter-btn whitespace-nowrap" data-type="inbound"><span class="anchor-nav-inner">Inbound 來訪</span></button>
                    </div>
                    <div class="activities-search-inner list-reveal-row flex items-center gap-sm pb-xs">
                      <span class="icon icon-search icon-m activities-search-icon"></span>
                      <input type="text" placeholder="Search 搜尋" aria-label="搜尋 Search" class="activities-search-input flex-1 bg-transparent outline-none text-h5 font-bold" data-panel="panel-visits" autocomplete="off">
                    </div>
                  </div>
                </div>
              </div>
              <div id="visits-list-outbound"></div>
              <div id="visits-list-inbound" style="display: none;"></div>
            </div>

            <!-- Competitions Panel -->
            <div class="activities-panel hidden" id="panel-competitions">
              <div class="activities-filter-bar md:sticky md:top-[200px] bg-white z-10">
                <div class="grid-12 pb-lg">
                  <div class="col-span-12 md:col-span-11 md:col-start-2 md:pl-[41px]">
                    <div class="activities-search-inner list-reveal-row flex items-center gap-sm pb-xs">
                      <span class="icon icon-search icon-m activities-search-icon"></span>
                      <input type="text" placeholder="Search 搜尋" aria-label="搜尋 Search" class="activities-search-input flex-1 bg-transparent outline-none text-h5 font-bold" data-panel="panel-competitions" autocomplete="off">
                    </div>
                  </div>
                </div>
              </div>
              <div id="competitions-list"></div>
            </div>

            <!-- Conferences Panel -->
            <div class="activities-panel hidden" id="panel-conferences">
              <div class="activities-filter-bar md:sticky md:top-[200px] bg-white z-10">
                <div class="grid-12 pb-lg">
                  <div class="col-span-12 md:col-span-11 md:col-start-2 md:pl-[41px]">
                    <div class="activities-search-inner list-reveal-row flex items-center gap-sm pb-xs">
                      <span class="icon icon-search icon-m activities-search-icon"></span>
                      <input type="text" placeholder="Search 搜尋" aria-label="搜尋 Search" class="activities-search-input flex-1 bg-transparent outline-none text-h5 font-bold" data-panel="panel-conferences" autocomplete="off">
                    </div>
                  </div>
                </div>
              </div>
              <div id="conferences-list"></div>
            </div>

            <!-- Students Present Panel -->
            <div class="activities-panel hidden" id="panel-students-present">
              <div class="activities-filter-bar md:sticky md:top-[200px] bg-white z-10">
                <div class="grid-12 pb-lg">
                  <div class="col-span-12 md:col-span-11 md:col-start-2 md:pl-[41px]">
                    <div class="activities-search-inner list-reveal-row flex items-center gap-sm pb-xs">
                      <span class="icon icon-search icon-m activities-search-icon"></span>
                      <input type="text" placeholder="Search 搜尋" aria-label="搜尋 Search" class="activities-search-input flex-1 bg-transparent outline-none text-h5 font-bold" data-panel="panel-students-present" autocomplete="off">
                    </div>
                  </div>
                </div>
              </div>
              <div id="students-present-list"></div>
            </div>

            <!-- Industry Panel -->
            <div class="activities-panel hidden" id="panel-industry">
              <div class="activities-filter-bar md:sticky md:top-[200px] bg-white z-10">
                <div class="grid-12 pb-lg">
                  <div class="col-span-12 md:col-span-11 md:col-start-2 md:pl-[41px]">
                    <div class="activities-search-inner list-reveal-row flex items-center gap-sm pb-xs">
                      <span class="icon icon-search icon-m activities-search-icon"></span>
                      <input type="text" placeholder="Search 搜尋" aria-label="搜尋 Search" class="activities-search-input flex-1 bg-transparent outline-none text-h5 font-bold" data-panel="panel-industry" autocomplete="off">
                    </div>
                  </div>
                </div>
              </div>
              <div id="industry-list"></div>
            </div>

          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <div id="site-footer" class="snap-zone"></div>

  <!-- JavaScript -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/ScrollToPlugin.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/Draggable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/InertiaPlugin.min.js"></script>
  <script src="../js/utils/helpers.js"></script>
  <script type="module" src="../js/main-modular.js"></script>

</body>
</html>
