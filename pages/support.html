<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support - SCCD</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/output.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
</head>
<body>

  <!-- Header -->
  <div id="site-header"></div>

  <!-- Main Content
       id="page-content" 是 SPA router 的注入錨點，直接訪問必須有。
       Layout 比照 legal pages（privacy-policy / accessibility）：左欄 sticky title chip + 右欄內文。
       外層 shell 樣式見 css/components/legal.css，右欄內文排版見 css/components/support.css。 -->
  <main id="page-content">

    <section class="legal-page-section legal-support">
      <div class="site-container">
        <div class="grid-12">

          <!-- 左欄：sticky title chip（左下角，比照 privacy-policy / accessibility） -->
          <div class="legal-title-col col-span-12 md:col-span-5">
            <div class="legal-title-block">
              <h2 class="hero-title text-black inline-block" data-hero-hl>SUPPORT</h2>
              <h2 class="hero-title-cn text-black inline-block" data-hero-hl>支援</h2>
            </div>
          </div>

          <!-- 右欄：內文（async 由 legal-data-loader 填入 #legal-content；資料見 data/support.json）
               support 無「最後更新」故不放 #legal-updated 區塊 -->
          <div class="legal-content-col col-span-12 md:col-span-7">
            <div id="legal-content"></div>
          </div>

        </div>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <div id="site-footer"></div>

  <!-- JavaScript -->
  <!-- GSAP & ScrollTrigger -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/Draggable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/InertiaPlugin.min.js"></script>
  <script src="../js/utils/helpers.js"></script>
  <script type="module" src="../js/main-modular.js"></script>

</body>
</html>
