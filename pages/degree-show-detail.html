<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Degree Show - SCCD</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/output.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
</head>
<body>

  <!-- Header -->
  <div id="site-header"></div>

  <!-- Main Content -->
  <main id="page-content">
    <!-- Hero Section
         背景圖改成 .hero-banner（占畫面一部分 + 隨機旋轉 + clip-path reveal 進場，跟其他 hero 一致）；
         字卡保留原本固定左下三段排版（年份 h4 / 英標 h2 / 中標 hero-title 大字）— 不套 hero-rand-grid 不參與 random placement
         手機版 .hero-mobile 圖墊底 + 文字 stack 疊在圖上（hero-mobile-sync.js 從桌面 clone 文案+banner src）
         進場順序由 chip 的 data-hero-enter 控：年份(1) 先進、英中標題(2) 一起進場 t=0.5（user 2026-06-03）
         data-hero-title-last 必須保留：setupStickyAndHeroChips（degree-show-data-loader.js）用它定位 hero section
         （descSection = 它的 nextElementSibling）來驅動 sticky 標題 chip + back/ref btn 的 scroll reveal — 移掉會整組消失 -->
    <section class="h-[700px] md:h-screen relative overflow-x-clip md:overflow-hidden" data-hero-title-last>
      <!-- 手機版（< 768px）：圖+文字 stack -->
      <div class="hero-mobile">
        <div class="hero-mobile-bg">
          <img src="" alt="">
        </div>
        <div class="hero-mobile-text">
          <h4 class="text-black hero-mobile-text-en" data-hero-hl></h4>
          <h2 class="text-black hero-mobile-title" data-hero-hl></h2>
          <h2 class="text-black hero-mobile-title-cn" data-hero-hl></h2>
        </div>
      </div>
      <!-- 桌面版（≥ 768px）：
           1) .hero-rand-grid 只包 banner（單一元素 → randomizeHeroLayout 仍會給它隨機 corner+rotation，clip-path reveal 不變）
           2) 字卡是 grid 同層 sibling 用 absolute 左下定位（不在 grid 內 → 不吃 random placement，固定左下） -->
      <div class="hero-rand-grid">
        <div class="hero-banner">
          <img id="hero-img" src="../images/CCC08866.jpg" alt="Degree Show">
        </div>
      </div>

      <!-- 字卡左下排版：保留原本 design 年份 h4 + 英標 h2 + 中標 hero-title 大字，固定位置不 random -->
      <div class="hidden md:block absolute inset-0 z-10 pointer-events-none">
        <div class="site-container h-full">
          <div class="h-full flex flex-col items-start justify-end pb-3xl md:pb-2xl gap-md">
            <h4 id="text-year" class="hero-text-en text-h4 text-black inline-block" data-hero-hl data-hero-enter="1"></h4>
            <h2 id="text-title-en" class="hero-text-cn text-h2 text-black inline-block font-bold" data-hero-hl data-hero-enter="2"></h2>
            <h2 id="text-title" class="hero-title text-black inline-block font-bold" data-hero-hl data-hero-enter="2"></h2>
          </div>
        </div>
      </div>
    </section>

    <!-- 文字説明 Section（min 100vh；移除 flex 居中改用自然流，pt-6xl 給頂部呼吸空間） -->
    <section class="bg-white relative" style="min-height: 100vh;">
      <div class="site-container w-full pt-6xl pb-3xl">
        <div class="grid-12">
          <!-- English (左) -->
          <div class="col-span-12 md:col-start-3 md:col-span-5 mb-lg md:mb-0">
            <h5 class="text-black leading-snug">
              <span id="text-desc-en" style="display: block;"></span>
            </h5>
          </div>
          <!-- Chinese (右) -->
          <div class="col-span-12 md:col-start-8 md:col-span-5">
            <h5 class="text-black leading-base">
              <span id="text-desc-cn" style="display: block;"></span>
            </h5>
          </div>
        </div>

        <!-- Events List：活動清單（時間 / 活動 / 地點 / 城市 四欄 1:2:2:1），由 JS 依 data.events 動態渲染；無 events 則整塊 hidden -->
        <!-- 文字一律 p1；活動/地點/城市顯示中英雙語（時間僅顯示一行） -->
        <div id="events-section" class="grid-12 mt-4xl hidden">
          <div class="col-span-12 md:col-start-3 md:col-span-10">
            <!-- Data rows（JS render） -->
            <div id="events-list"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- Sticky Info Card：scroll 進入 description section pt 之後出現、釘左側
         結構沿用 anchor-nav-inner pattern：外 .sticky-chip 透明 wrapper，內 .sticky-chip-inner span 撐底色與 padding
         - year chip（text-h5）
         - title chip（text-h5，英上中下同一張）
         - branch chip（text-p1，英上中下同一張，依當前 event 切換內容）
         動畫：clip-path 由上往下 reveal、branch 切換收→換字→展
         範圍：description section pt-6xl 後 → event-galleries-root bottom 前

         版面錨點：
         - 外層 #sticky-info-card position:fixed top:50%（不 translateY） — 直接是 title group 上緣對齊 viewport center
         - .sticky-title-group flex-col 包 title chip，translateY(-50%) 自己置中
         - #sticky-branch-chip 改 position:absolute top:100%（相對 title-group），脫離 flex flow
           → 加入 / 移除 branch chip 不會影響 title group 的視覺位置（之前用 flex stack 改變 group 高度，
              translateY(-50%) 套整塊讓 title 上下跳） -->
    <div id="sticky-info-card" class="hidden md:block fixed pointer-events-none"
         style="top: 200px; left: var(--container-padding, 60px); z-index: 20; opacity: 0; visibility: hidden;">
      <div class="sticky-title-group relative flex flex-col items-start" style="gap: 0.6rem; width: max-content;">
        <div id="sticky-title-chip" class="sticky-chip">
          <span class="sticky-chip-inner text-h5 font-bold">
            <span id="sticky-title-en" class="block"></span>
            <span id="sticky-title" class="block"></span>
          </span>
        </div>
        <!-- branch chip absolute 釘 title group 底下，不影響 group 高度 → title 位置穩定
             en/zh 各強制單行（whitespace-nowrap）— 視覺契約：分支名 = 一行 EN + 一行 ZH，不可 wrap -->
        <div id="sticky-branch-chip" class="sticky-chip absolute left-0" style="top: 100%; margin-top: 1rem;">
          <span class="sticky-chip-inner text-p1 font-semibold">
            <span id="sticky-branch-en" class="block whitespace-nowrap"></span>
            <span id="sticky-branch" class="block whitespace-nowrap"></span>
          </span>
        </div>
      </div>
    </div>

    <!-- 左下角返回 degree show 按鈕：套 sticky-chip 結構（外 wrapper clip-path reveal + inner 撐 bg + padding）
         left 對齊 hero 標題 / sticky-info-card / logo 左緣（var(--container-padding)）
         顯隱由 setupStickyAndHeroChips 跟 sticky title chip 同節奏切（clip-path 由上往下 reveal） -->
    <a id="degree-show-back-btn" href="/activities?section=degree-show"
       class="sticky-chip hidden md:block"
       aria-label="返回 Degree Show">
      <span class="sticky-chip-inner">
        <span class="icon icon-arrow-left"></span>
      </span>
    </a>

    <!-- Ref 按鈕：back btn 右邊；點擊展開 ref chip list（論壇 / 工作營 / 講座 等 non-exhibition events 的 refs）
         JS 在 loadDegreeShowDetail 內 setupRefBtn 動態填 popover；無 refs → 整顆 hidden
         結構 / 樣式跟 back btn 一樣（sticky-chip + strict B/W），clip-reveal 由 setupStickyAndHeroChips 同步控
         popover 內 chip card 沿用 lightbox-ref-popover / lightbox-ref-card 既有樣式 -->
    <button type="button" id="degree-show-ref-btn"
            class="sticky-chip hidden md:block"
            aria-label="顯示 references">
      <span class="sticky-chip-inner">
        <span class="icon icon-ref-lightbox"></span>
      </span>
    </button>
    <div id="degree-show-ref-popover" class="lightbox-ref-popover">
      <div id="degree-show-ref-stack" class="lightbox-ref-stack"></div>
    </div>

    <!-- 主影片 Section -->
    <section id="video-outer-section" class="bg-white pt-3xl hidden">
      <div class="site-container">
        <div id="video-section" class="grid-12">
          <div class="col-span-12">
            <div id="video-wrapper" class="w-full aspect-video bg-black">
              <!-- Video content injected by JS -->
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Per-event Gallery Sections：JS 依 data.events[].images 動態 render
         每個 event 一個 <section data-event-gallery data-event-index="i">，內含 .division-images gallery
         section 高度由 gallery 撐起 + py 呼吸空間；sticky chip 依 scroll position 判定當前 event -->
    <div id="event-galleries-root" class="bg-white"></div>

    <!-- 紀錄影片 Section -->
    <section id="documentary-outer-section" class="bg-white pb-3xl hidden">
      <div class="site-container">
        <div id="documentary-video-section" class="grid-12">
          <div class="col-span-12">
            <div id="documentary-video-wrapper" class="w-full aspect-video bg-black">
              <!-- Documentary video content injected by JS -->
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Next Project Section：
         桌面：兩張 poster overlap（左=prev/older 在上，右=next/newer 在下偏 50%），
              預設 50% 黑 overlay，hover 取消 overlay + 顯示年份/英中標題（隨機色與旋轉，year 在上、名稱在下），
              另一張同時 clip-path 掃入隨機色（仿首頁 newsOverlay）；
         手機：單純 stack。
         posters 隨機旋轉 -4°~6°（排除 0）。 -->
    <section id="next-project-section" class="bg-white relative overflow-hidden pt-3xl pb-3xl md:pt-6xl md:pb-6xl">
      <!-- 桌面版：overlap stage -->
      <div id="next-project-stage" class="hidden md:block relative w-full">
        <!-- prev：older year，左上（66vw + 左移 -8vw，與 next 在中段重疊） -->
        <a id="prev-link" href="#" class="block absolute" style="top: 0; left: -8vw; width: 66vw; z-index: 1;">
          <div id="prev-card" class="relative">
            <img id="prev-img" src="../images/Degree Show.jpg" alt="" class="block w-full h-auto pointer-events-none">
            <div id="prev-dim" class="absolute inset-0 bg-black pointer-events-none" style="opacity: 0.5; transition: opacity 0.3s ease;"></div>
            <div id="prev-clip" class="absolute inset-0 pointer-events-none" style="clip-path: inset(100% 0 0 0); transition: clip-path 0.5s cubic-bezier(0.25,0,0,1);"></div>
          </div>
        </a>
        <!-- next：newer year，右下（66vw + 右移 -8vw） -->
        <a id="next-link" href="#" class="block absolute" style="right: -8vw; width: 66vw; z-index: 1;">
          <div id="next-card" class="relative">
            <img id="next-img" src="../images/Degree Show.jpg" alt="" class="block w-full h-auto pointer-events-none">
            <div id="next-dim" class="absolute inset-0 bg-black pointer-events-none" style="opacity: 0.5; transition: opacity 0.3s ease;"></div>
            <div id="next-clip" class="absolute inset-0 pointer-events-none" style="clip-path: inset(100% 0 0 0); transition: clip-path 0.5s cubic-bezier(0.25,0,0,1);"></div>
          </div>
        </a>

        <!-- Labels groups 改放到 stage level（不再 nested in card 內），位置以 viewport 為主：
             - prev 釘 stage 左下、next 釘 stage 右上（這是「圖片之外」的相對白空間）
             - 不被 card rotation 影響、不被 card 結構裁切
             - gap 對齊 hero `gap-md`（1.5rem）
             - chip 預設 clip-path 隱藏，hover 時 stagger reveal（prev 從左到右、next 從右到左） -->
        <div id="prev-labels" class="absolute flex flex-col items-start pointer-events-none" style="bottom: 20%; left: 5vw; gap: 1.5rem; z-index: 5;">
          <h4 id="prev-year" class="font-bold whitespace-nowrap" style="padding: 0.4rem 0.6rem 0.3rem; color: #000; transform-origin: left center; clip-path: inset(0 100% 0 0); transition: clip-path 0.5s cubic-bezier(0.25,0,0,1);"></h4>
          <h2 id="prev-title-en" class="font-bold whitespace-nowrap" style="padding: 0.4rem 0.6rem 0.3rem; color: #000; transform-origin: left center; clip-path: inset(0 100% 0 0); transition: clip-path 0.5s cubic-bezier(0.25,0,0,1);"></h2>
          <h2 id="prev-title" class="font-bold whitespace-nowrap" style="padding: 0.4rem 0.6rem 0.3rem; color: #000; transform-origin: left center; clip-path: inset(0 100% 0 0); transition: clip-path 0.5s cubic-bezier(0.25,0,0,1);"></h2>
        </div>
        <div id="next-labels" class="absolute flex flex-col items-end pointer-events-none" style="top: 20%; right: 5vw; gap: 1.5rem; z-index: 5;">
          <h4 id="next-year" class="font-bold whitespace-nowrap" style="padding: 0.4rem 0.6rem 0.3rem; color: #000; transform-origin: right center; clip-path: inset(0 0 0 100%); transition: clip-path 0.5s cubic-bezier(0.25,0,0,1);"></h4>
          <h2 id="next-title-en" class="font-bold whitespace-nowrap" style="padding: 0.4rem 0.6rem 0.3rem; color: #000; transform-origin: right center; clip-path: inset(0 0 0 100%); transition: clip-path 0.5s cubic-bezier(0.25,0,0,1);"></h2>
          <h2 id="next-title" class="font-bold whitespace-nowrap" style="padding: 0.4rem 0.6rem 0.3rem; color: #000; transform-origin: right center; clip-path: inset(0 0 0 100%); transition: clip-path 0.5s cubic-bezier(0.25,0,0,1);"></h2>
        </div>
      </div>

      <!-- 手機版：簡單 stack -->
      <div class="md:hidden site-container">
        <a id="prev-link-m" href="#" class="block mb-3xl">
          <img id="prev-img-m" src="../images/Degree Show.jpg" alt="" class="block w-full h-auto">
          <h5 id="prev-year-mobile" class="text-black whitespace-nowrap mt-sm"></h5>
          <h5 id="prev-title-mobile" class="text-black whitespace-nowrap"></h5>
        </a>
        <a id="next-link-m" href="#" class="block">
          <img id="next-img-m" src="../images/Degree Show.jpg" alt="" class="block w-full h-auto">
          <h5 id="next-year-mobile" class="text-black whitespace-nowrap mt-sm"></h5>
          <h5 id="next-title-mobile" class="text-black whitespace-nowrap"></h5>
        </a>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <div id="site-footer"></div>

  <!-- JavaScript -->
  <!-- GSAP & ScrollTrigger -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/Draggable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/InertiaPlugin.min.js"></script>
  <!-- Helper Functions - 必須在 main.js 之前載入 -->
  <script src="../js/utils/helpers.js"></script>
  <script type="module" src="../js/main-modular.js"></script>

</body>
</html>
