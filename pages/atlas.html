<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atlas - SCCD</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/output.css">
  <link rel="stylesheet" href="../css/components/atlas.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
</head>
<body style="overflow: hidden; height: 100vh;">

  <!-- Header -->
  <div id="site-header"></div>

  <!-- Main Content -->
  <main id="page-content">
    <section id="atlas-main">
      <canvas id="atlas-mask-canvas" aria-hidden="true"></canvas>

      <div id="atlas-stage">
        <div id="atlas-zoom">
          <div id="atlas-content">
            <!-- 名稱由 atlas.js 注入 -->
          </div>
        </div>
      </div>

      <!-- 右下角細節面板 -->
      <aside id="atlas-detail" aria-live="polite">
        <div class="atlas-detail-label" data-atlas-detail-label></div>
        <div class="atlas-detail-name" data-atlas-detail-name></div>
        <div class="atlas-detail-desc" data-atlas-detail-desc></div>
      </aside>

      <!-- 左下角操作提示 -->
      <div id="atlas-hint" aria-hidden="true">
        <span>scroll to zoom · hover to inspect</span>
      </div>
    </section>
  </main>

  <!-- JavaScript -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/ScrollTrigger.min.js"></script>
  <script src="../js/utils/helpers.js"></script>
  <script type="module" src="../js/main-modular.js"></script>

</body>
</html>
